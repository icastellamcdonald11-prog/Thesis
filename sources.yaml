      link_attr: "href"
      min_title_len: 8

  - id: pboc
    name: 中国人民银行 (PBOC)
    type: scrape
    route: generic
    category: ministry
    item_type: article
    enabled: true
    weight: 1.0
    max_items: 30
    scrape_config:
      base_url: "http://www.pbc.gov.cn/"
      # 沟通交流 > 新闻发布: article links stay under this section path.
      list_url: "http://www.pbc.gov.cn/goutongjiaoliu/113456/113469/index.html"
      list_selector: "a[href*='/goutongjiaoliu/113456/113469/']"
      link_attr: "href"
      min_title_len: 8

  - id: mofcom
    name: 商务部 (MOFCOM)
    type: scrape
    route: generic
    category: ministry
    item_type: article
    enabled: true
    weight: 1.0
    max_items: 30
    scrape_config:
      base_url: "https://www.mofcom.gov.cn/"
      list_url: "https://www.mofcom.gov.cn/xwfb/index.html"
      list_selector: "a[href*='/art/']"
      link_attr: "href"
      min_title_len: 8

  - id: stats_nbs
    name: 国家统计局 (NBS data releases)
    type: scrape
    route: generic
    category: ministry
    item_type: article
    enabled: true
    weight: 1.0
    max_items: 30
    scrape_config:

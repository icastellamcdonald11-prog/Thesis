# Source list for Stage 1 acquisition. Adding a new rsshub/rss source requires
# no code changes — just add an entry here. `scrape` sources need a matching
# module registered in pipeline/acquisition/scraping/registry.py.
#
# Live-run findings (GitHub Actions, 2026-07-05):
#   - tophub scraper WORKS (3,023 items on first fetch).
#   - rsshub.app returns 403 to datacenter IPs — fallback mirrors configured in
#     config/settings.yaml; self-hosting RSSHub is the durable fix.
#   - weibo_hot switched from rsshub to a direct scraper of Weibo's public JSON API.
#   - 36kr switched to its native RSS feed (no RSSHub dependency).
#   - china_energy_news disabled: guessed URL path 404s, needs a human to find the
#     right section URL and selectors (see scrape_config below, then re-enable).
#
# max_items caps how many fetched items a source may insert per run, to protect
# the Stage 2 LLM budget from firehose sources. Dedupe runs before the cap bites
# on re-fetched items, so day 2 onward mostly inserts genuinely new entries.

sources:
  - id: weibo_hot
    name: 微博热搜
    type: scrape
    route: weibo_hot
    category: trending
    item_type: trend   # topics, not articles — triaged differently (see triage prompt)
    # DISABLED 2026-07-05: weibo.com/ajax/side/hotSearch 403s GitHub's datacenter
    # IPs. Not worth fighting — the tophub source's 微博 card already carries the
    # Weibo hot-search list. Re-enable only if tophub drops that card.
    enabled: false
    weight: 0.6

  - id: tophub
    name: 今日热榜 (tophub.today)
    type: scrape
    route: tophub
    category: trending
    item_type: trend
    enabled: true
    weight: 0.6
    max_items: 500
    # Only cards whose platform heading contains one of these (substring match).
    # Keeps news/finance/tech platforms, drops gaming/entertainment hot lists.
    platforms:
      - 微博          # Weibo
      - 知乎          # Zhihu
      - 百度          # Baidu hot search
      - 今日头条      # Toutiao
      - 36氪          # 36Kr
      - 虎嗅          # Huxiu
      - 雪球          # Xueqiu (markets/retail investors)
      - 华尔街见闻    # Wallstreetcn
      - 财联社        # Cailianshe (markets wire)
      - 澎湃新闻      # The Paper
      - 第一财经      # Yicai
      - IT之家        # ITHome (tech)

  - id: jiemian
    name: 界面新闻
    type: scrape
    # Both /jiemian/list/4 and /jiemian/newsflash 503 on every RSSHub instance
    # (confirmed 2026-07-05; the same mirrors serve yicai/thepaper fine), so the
    # whole jiemian namespace is broken on RSSHub — scraping the site directly.
    # Jiemian article URLs look like /article/NNNNNNN.html; if this selector
    # matches nothing the run log dumps the anchors actually on the page.
    route: generic
    category: business
    item_type: article
    enabled: true
    weight: 1.0
    scrape_config:
      base_url: "https://www.jiemian.com/"
      list_url: "https://www.jiemian.com/lists/4.html"
      list_selector: "a[href*='/article/']"
      title_selector: null
      link_selector: null
      link_attr: "href"
      summary_selector: null
      min_title_len: 8

  - id: yicai
    name: 第一财经
    type: rsshub
    route: /yicai/brief
    category: markets
    item_type: article
    enabled: true
    weight: 1.0

  - id: 36kr
    name: 36氪
    type: rss
    route: https://36kr.com/feed
    category: tech
    item_type: article
    enabled: true
    weight: 1.0

  - id: thepaper
    name: 澎湃新闻
    type: rsshub
    route: /thepaper/featured
    category: general
    item_type: article
    enabled: true
    weight: 1.0

  # ---------------------------------------------------------------------------
  # Ministries, regulators, and think tanks (category: ministry | thinktank).
  # These feed a dedicated "New from ministries & think tanks" digest section
  # (anything fetched in the last 24h, regardless of triage score) AND flow
  # through normal triage, so a big policy release can also become a pitch
  # candidate. All scraped — zero API cost to monitor.
  #
  # SELECTORS UNVERIFIED (added 2026-07-12 from a sandbox with no internet
  # egress, same caveat as the original scaffold). Gov-site CMSes mostly use
  # ./YYYYMM/tYYYYMMDD_NNNN.html or /art/YYYY/art_NNN.html link patterns; if a
  # selector matches nothing, the run log dumps the anchors actually on the
  # page — fix the selector from that. Some gov.cn sites also block foreign
  # datacenter IPs (like rsshub.app did); if one 403s persistently from
  # Actions, set enabled: false with a comment rather than fighting it.
  # ---------------------------------------------------------------------------

  - id: gov_cn_policies
    name: 国务院最新政策 (State Council)
    type: scrape
    route: generic
    category: ministry
    item_type: article
    enabled: true
    weight: 1.0
    max_items: 30
    scrape_config:
      base_url: "https://www.gov.cn/"
      list_url: "https://www.gov.cn/zhengce/zuixin/"
      list_selector: "a[href*='/zhengce/']"
      link_attr: "href"
      min_title_len: 10

  - id: ndrc
    name: 国家发改委 (NDRC)
    type: scrape
    route: generic
    category: ministry
    item_type: article
    enabled: true
    weight: 1.0
    max_items: 30
    scrape_config:
      base_url: "https://www.ndrc.gov.cn/xwdt/xwfb/"
      list_url: "https://www.ndrc.gov.cn/xwdt/xwfb/"
      list_selector: "a[href*='t20']"
      link_attr: "href"
      min_title_len: 8

  - id: mof
    name: 财政部 (Ministry of Finance)
    type: scrape
    route: generic
    category: ministry
    item_type: article
    enabled: true
    weight: 1.0
    max_items: 30
    scrape_config:

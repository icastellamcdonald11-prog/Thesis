  - id: china_energy_news
    name: 中国能源报
    type: scrape
    route: generic
    category: energy
    item_type: article
    # DISABLED 2026-07-05 (second attempt): /jsxw fetches fine but the raw HTML
    # contains only section-nav anchors — the article list is JS-rendered. Fixing
    # this needs either (a) a Playwright-rendered fetch, or (b) the underlying
    # JSON/XHR endpoint the page calls (find it in browser devtools > Network tab).
    # Parked pending that decision; energy stories still arrive via other sources.
    enabled: false

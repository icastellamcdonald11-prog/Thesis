# Source list for Stage 1 acquisition. Adding a new rsshub/rss source requires
# no code changes — just add an entry here. `scrape` sources need a matching
# module registered in pipeline/acquisition/scraping/registry.py, or use
# `type: scrape, route: generic` with a `scrape_config:` block (CSS selectors).
#
# 2026-07-20 REWRITE: replaced the original 7-source starter list with the
# ~30-publication list you gave me, per the pivot away from triage/scoring and
# the Sonnet differentiation-check toward "translate + link each publication's
# daily headline" (see pipeline/translate/, config/settings.yaml). Every
# source below has `max_items: 1` — Stage 1 now keeps only the single top item
# per source per fetch (URL-dedup means an unchanged headline just doesn't
# reinsert, so a source with no new lead story is silently absent from a given
# day's digest rather than repeating stale content).
#
# IMPORTANT — most of these are new and UNVERIFIED. This environment has no
# general internet egress to test live HTTP fetches (confirmed 2026-07-20:
# jiemian.com and yicai.com connections timed out, people.com.cn returned 403,
# all from here — GitHub Actions runners have historically had real internet
# access, so these may well work fine from there even though I can't check).
# Most `scrape_config.list_selector` values below are the best-effort generic
# guess `a[href*='.html']` (a common but not universal CN news-site URL
# pattern), copied from the jiemian/china_energy_news precedent already in
# this repo. When a selector matches nothing, GenericSelectorScraper logs a
# sample of the anchors actually on the page — use that to fix the selector.
# Run `python -m pipeline.acquisition.run --source <id>` per source to check
# and iterate; a broken source is logged and skipped, never fatal to the run.
#
# Explicitly requested skip: Caixin (財新) — paywalled, disabled per your note
# to skip it unless we have an account.
#
# From your second (name-only, no-URL) list, these are still NOT added because
# I don't have a confident real URL for them — tell me the URLs (or say "look
# it up") and I'll add them: 人物, 每日人物, 新周刊, 中国新闻周刊, 都市快报.
# The rest of that list duplicates publications already below (澎湃新闻/thepaper,
# 界面新闻/jiemian, 新京报/bjnews, 南方周末/infzm, 21世纪经济报道/century_biz_herald,
# 第一财经/yicai, 36氪) or is added as xinhua / china_daily / china_youth_daily /
# lifeweek / shobserver (上观, in the 2026-07-21 batch below) where I'm confident
# of the real domain from general knowledge — still unverified, flagged below.
#
# 2026-07-21 ADDITIONS: financial wires, sector-vertical trade press, and
# provincial/regional outlets, per your ask to fill the gaps flagged after the
# first live run (heavy on policy/party press, light on markets wires, sector
# verticals, and regional coverage that often scoops national outlets). Same
# caveats as above — best-effort domains/selectors, confidence noted per
# source, unverified against live DOM.

sources:
  - id: caixin
    name: 财新 Caixin
    type: scrape
    route: generic
    category: markets
    item_type: article
    enabled: false  # paywalled — you said skip unless we have an account
    max_items: 1
    scrape_config:
      base_url: "https://www.caixin.com"
      list_url: "https://www.caixin.com"
      list_selector: "a[href*='.html']"
      title_selector: null
      link_selector: null
      link_attr: "href"
      summary_selector: null
      min_title_len: 8

  - id: jiemian

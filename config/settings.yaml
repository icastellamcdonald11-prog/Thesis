# Non-secret tunables. Secrets (API keys, SMTP credentials) come from the
# environment / GitHub Actions secrets — see .env.example.

timezone: "Asia/Shanghai"

acquisition:
  # rsshub.app blocks datacenter IPs (confirmed: instant 403 on every route from
  # GitHub Actions runners, 2026-07-05). Fallback mirrors are tried in order after
  # the primary fails. Public mirrors come and go — the durable fix is self-hosting
  # RSSHub (one Docker container) and putting its URL first here.
  rsshub_base_url: "https://rsshub.app"
  rsshub_fallback_urls:
    - "https://rsshub.rssforever.com"
    - "https://hub.slarker.me"
    - "https://rsshub.pseudoyu.com"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
  request_timeout_seconds: 15
  max_retries: 3
  backoff_base_seconds: 2
  per_domain_min_interval_seconds: 3
  fuzzy_title_similarity_threshold: 0.85
  fuzzy_dedupe_window_hours: 72

# 2026-07-21: most `scrape`-type sources have no description on their listing
# page for GenericSelectorScraper's summary_selector to grab, so the digest
# showed a title and link only for most sources. When an item's summary_zh
# comes back empty, Stage 1 fetches the article's own page and pulls its
# first substantial paragraph(s) as a stand-in — one extra request per item
# actually kept (after dedup/max_items), not per candidate. Lighter timeout/
# retry than the main scrape settings since this is enrichment, not core to
# the item existing — a slow article page shouldn't stall the whole run.
detail_summary:
  enabled: true
  min_paragraph_len: 20
  max_summary_len: 200
  timeout_seconds: 10
  max_retries: 1

# Legacy Stage 2 (Haiku scoring against the FT pitch criteria) — disabled
# 2026-07-20 in favor of the simpler `translate:` flow below (no scoring, just
# a plain translation of each source's daily headline). Code and table are
# untouched; set enabled: true (and see scripts/run_all.py) to bring it back.
triage:
  enabled: false
  model: "claude-haiku-4-5-20251001"
  batch_size: 25
  max_tokens: 4096
  score_threshold_total: 4
  score_threshold_in_niche: 1

# Cluster (recurring-theme) detection reads triage tags, so it's dormant along
# with triage above — no separate toggle needed.
cluster:
  window_days: 7
  min_sources: 3

# Legacy Stage 3 (Sonnet + web_search competitor/FT differentiation check) —
# disabled 2026-07-20 per product feedback: too expensive and unreliable.
# Code and table are untouched; set enabled: true to bring it back.
diffcheck:
  enabled: false
  model: "claude-sonnet-5"
  daily_cap: 15
  max_tokens: 2048

# Current Stage 2 (2026-07-20): translates each source's daily headline into
# English. Cheap — one Haiku batch call for the whole day's headlines, no web
# search, no scoring. items_pending_translation() (pipeline/db.py) already
# scopes to *today's* items only, but max_items_per_run is a second line of
# defense against unbounded API spend if that ever regresses or a source
# misbehaves and floods items in one day — with ~30 sources capped to 1 item
# each in sources.yaml, worst case is ~30/day, so 60 gives headroom.
translate:
  model: "claude-haiku-4-5-20251001"
  batch_size: 40
  max_tokens: 4096
  max_items_per_run: 60

digest:
  output_dir: "digests"

email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  use_tls: true
  subject_prefix: "[FT China Pitch Digest]"

storage:
  db_path: "data/pitch_discovery.db"
  feedback_csv: "feedback.csv"
